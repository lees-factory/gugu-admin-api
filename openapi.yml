components:
  headers:
    Cache-Control:
      description: 캐시를 비활성화하는 표준 헤더
      schema:
        type: string
        example: no-store, no-cache, must-revalidate
    Pragma:
      description: HTTP/1.0 클라이언트 캐시를 비활성화하는 호환성 헤더
      schema:
        type: string
        example: no-cache
    Expires:
      description: 응답이 즉시 만료되었음을 나타내는 헤더
      schema:
        type: string
        example: '0'
  securitySchemes:
    AdminApiKey:
      type: apiKey
      in: header
      name: X-Admin-API-Key
      description: |
        모든 `/v1` 어드민 API 호출 시 필요한 헤더.
        `ADMIN_API_KEYS`가 설정되면 해당 값 중 하나와 일치해야 하며, 비어 있으면 하위호환을 위해 non-empty 값만 확인합니다.
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        `POST /v1/admin/auth/login`으로 발급한 관리자 액세스 토큰.
        `Authorization: Bearer <token>` 형식으로 전송합니다.
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    APIResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: success
        data:
          description: 성공 응답 데이터
        error:
          $ref: '#/components/schemas/ErrorPayload'
    ErrorPayload:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            status:
              type: string
              enum:
                - error
            error:
              $ref: '#/components/schemas/ErrorPayload'
    AcceptedMessageResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
    AdminLoginRequest:
      type: object
      required:
        - id
        - password
      properties:
        id:
          type: string
          description: 관리자 로그인 ID (`admin_user.login_id`)
          example: super-admin
        password:
          type: string
          format: password
          description: 관리자 로그인 비밀번호
          example: my-admin-password
    AdminLoginResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - admin_id
                - login_id
                - access_token
                - token_type
                - expires_at
              properties:
                admin_id:
                  type: string
                  description: 로그인한 관리자 내부 PK (`admin_user.id`)
                login_id:
                  type: string
                  description: 로그인에 사용한 관리자 ID (`admin_user.login_id`)
                access_token:
                  type: string
                  description: 관리자 Bearer 액세스 토큰
                token_type:
                  type: string
                  enum:
                    - Bearer
                expires_at:
                  type: string
                  format: date-time
    PriceUpdateRequest:
      type: object
      description: |
        `POST /v1/batch/update-sku-snapshots` 요청 본문.
        가격 수집 단위는 SKU이며, product-level 가격은 저장하지 않습니다.
      properties:
        collection_source:
          type: string
          description: 추가 필터. `target_group` 적용 후 다시 좁힐 때 사용합니다.
          example: HOT_PRODUCT_QUERY
        market:
          type: string
          description: 추가 마켓 필터
          enum:
            - ALIEXPRESS
            - COUPANG
        product_ids:
          type: array
          description: 특정 내부 `product.id` 목록(`external_product_id`가 아님). 값이 있으면 `target_group`보다 우선합니다.
          items:
            type: string
        currencies:
          type: array
          description: |
            조회/적재 대상 통화 목록.
            미지정 시 기본값은 `KRW`입니다.
            저사양 환경에서는 `KRW`/`USD`를 한 요청에서 동시에 넣기보다 분리 실행을 권장합니다.
          items:
            type: string
            enum:
              - KRW
              - USD
        target_group:
          type: string
          description: |
            대상 상품 그룹.
            `ALL`: 전체 후보, `HOT_PRODUCTS`: `collection_source=HOT_PRODUCT_QUERY`, `TRACKED`: `user_tracked_item.deleted_at IS NULL`의 distinct `product_id`.
          enum:
            - ALL
            - HOT_PRODUCTS
            - TRACKED
          default: ALL
        collected_before:
          type: string
          description: 이 시각 이전에 수집된 상품만 대상으로 제한
          format: date-time
        force:
          type: boolean
          description: 강제 갱신 플래그(향후 확장용 필드)
        requested_by:
          type: string
          description: 요청자 식별자(로그/추적용)
      example:
        currencies:
          - KRW
        target_group: ALL
        requested_by: scheduler
    HotProductLoadRequest:
      type: object
      properties:
        category_ids:
          type: array
          description: 카테고리 ID 목록
          items:
            type: string
        keywords:
          type: string
          description: 검색 키워드
        sort:
          type: string
          description: 정렬 기준
        min_sale_price:
          type: string
          description: 최소 가격
        max_sale_price:
          type: string
          description: 최대 가격
    HotProductLoadResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - requested_count
                - hot_product_saved
                - product_saved_count
                - skipped_count
              properties:
                requested_count:
                  type: integer
                  description: API에서 조회된 상품 수
                processed_pages:
                  type: integer
                  description: 처리된 페이지 수
                hot_product_saved:
                  type: integer
                  description: 처리된 hot product item 수
                product_saved_count:
                  type: integer
                  description: product 테이블에 신규 저장된 수
                skipped_count:
                  type: integer
                  description: 이미 존재하여 건너뛴 상품 수
    PriceUpdateAcceptedResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - message
                - job
              properties:
                message:
                  type: string
                job:
                  $ref: '#/components/schemas/BatchJobStatus'
    ProductListResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - language
                - items
              properties:
                language:
                  type: string
                  enum:
                    - KO
                    - EN
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/ProductListItem'
    ProductListItem:
      type: object
      required:
        - id
        - market
        - external_product_id
        - original_url
        - title
        - main_image_url
        - product_url
        - collection_source
        - language
      properties:
        id:
          type: string
          description: 내부 상품 ID
        market:
          type: string
          enum:
            - ALIEXPRESS
            - COUPANG
          description: 마켓
        external_product_id:
          type: string
          description: 원천 마켓 상품 ID
        original_url:
          type: string
          description: 원천 URL
        title:
          type: string
          description: 상품 제목(요청 language 우선, 없으면 기본값)
        main_image_url:
          type: string
          description: 대표 이미지 URL(요청 language 우선, 없으면 기본값)
        product_url:
          type: string
          description: 상세 이동 URL(클릭 시 외부 마켓 링크로 이동)
        collection_source:
          type: string
          description: 수집 경로
        language:
          type: string
          enum:
            - KO
            - EN
          description: 응답 로컬라이제이션 언어
    BatchStatusResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/BatchJobStatus'
                - type: object
                  properties:
                    job_type:
                      type: string
                    status:
                      type:
                        - string
                        - 'null'
    BatchJobStatus:
      type: object
      description: SKU snapshot 배치의 최근 상태 스냅샷
      required:
        - job_type
        - status
        - trigger_type
        - filter
        - requested_at
        - total_count
        - success_count
        - fail_count
        - skipped_count
      properties:
        job_type:
          type: string
          enum:
            - SKU_SNAPSHOT_UPDATE
        status:
          type: string
          enum:
            - QUEUED
            - RUNNING
            - COMPLETED
            - FAILED
        trigger_type:
          type: string
          enum:
            - MANUAL
            - SCHEDULED
        filter:
          $ref: '#/components/schemas/PriceUpdateFilter'
        requested_at:
          type: string
          format: date-time
        started_at:
          type:
            - string
            - 'null'
          format: date-time
        finished_at:
          type:
            - string
            - 'null'
          format: date-time
        total_count:
          type: integer
          description: 이번 실행에서 평가된 전체 대상 상품 수
        success_count:
          type: integer
          description: 1개 이상 SKU snapshot 기록에 성공한 상품 수
        fail_count:
          type: integer
          description: API/기록 오류로 처리 실패한 상품 수
        skipped_count:
          type: integer
          description: 처리할 SKU가 없거나 저장 대상이 없어 건너뛴 상품 수
        last_error:
          type: string
          description: 마지막 오류 메시지(없으면 빈 값)
    PriceUpdateFilter:
      type: object
      description: 실행 당시 적용된 필터 스냅샷
      properties:
        collection_source:
          type: string
          description: 수집 경로 추가 필터
        market:
          type: string
          enum:
            - ALIEXPRESS
            - COUPANG
          description: 마켓 추가 필터
        product_ids:
          type: array
          description: 명시적 대상 product.id 목록
          items:
            type: string
        currencies:
          type: array
          description: 실행 통화 목록
          items:
            type: string
            enum:
              - KRW
              - USD
        target_group:
          type: string
          description: 대상 그룹
          enum:
            - ALL
            - HOT_PRODUCTS
            - TRACKED
        collected_before:
          type:
            - string
            - 'null'
          format: date-time
          description: 수집시각 상한 필터
        force:
          type: boolean
          description: 강제 갱신 플래그
    TokenGenerateRequest:
      type: object
      required:
        - code
        - app_type
      properties:
        code:
          type: string
          description: AliExpress 콜백에서 받은 OAuth 인증 코드
        app_type:
          type: string
          enum:
            - AFFILIATE
            - DROPSHIPPING
          description: 토큰을 발급할 AliExpress 앱 유형
    TokenRefreshRequest:
      type: object
      required:
        - app_type
      properties:
        app_type:
          type: string
          enum:
            - AFFILIATE
            - DROPSHIPPING
    TokenResultResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - seller_id
                - app_type
                - access_token_expires_at
              properties:
                seller_id:
                  type: string
                app_type:
                  type: string
                  enum:
                    - AFFILIATE
                    - DROPSHIPPING
                access_token_expires_at:
                  type: string
                  format: date-time
                refresh_token_expires_at:
                  type:
                    - string
                    - 'null'
                  format: date-time
    TokenStatusResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - tokens
              properties:
                tokens:
                  type: array
                  items:
                    $ref: '#/components/schemas/TokenStatusEntry'
    TokenStatusEntry:
      type: object
      required:
        - app_type
        - status
      properties:
        app_type:
          type: string
          enum:
            - AFFILIATE
            - DROPSHIPPING
        seller_id:
          type: string
        user_nick:
          type: string
        status:
          type: string
          description: "ACTIVE: 정상 / EXPIRING_SOON: 곧 만료 / EXPIRED: 만료됨 / NOT_FOUND: 토큰 없음"
          enum:
            - ACTIVE
            - EXPIRING_SOON
            - EXPIRED
            - NOT_FOUND
        access_token_expires_at:
          type: string
          format: date-time
        refresh_token_expires_at:
          type:
            - string
            - 'null'
          format: date-time
        last_refreshed_at:
          type: string
          format: date-time
    AdminUser:
      type: object
      required:
        - id
        - email
        - display_name
        - plan
        - status
        - email_verified
        - tracked_item_count
        - created_at
        - sessions
      properties:
        id:
          type: string
        email:
          type: string
        display_name:
          type: string
        plan:
          type: string
          enum:
            - FREE
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        email_verified:
          type: boolean
        tracked_item_count:
          type: integer
        created_at:
          type: string
          format: date-time
        last_login_at:
          type:
            - string
            - 'null'
          format: date-time
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserLoginSession'
    AdminUserLoginSession:
      type: object
      required:
        - id
        - user_id
        - status
        - status_reason
        - refresh_token_hash
        - token_family_id
        - user_agent
        - client_ip
        - device_name
        - expires_at
        - last_seen_at
        - created_at
      properties:
        id:
          type: string
        user_id:
          type: string
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        status_reason:
          type: string
          enum:
            - ACTIVE
            - REVOKED
            - ROTATED
            - REUSED
            - EXPIRED
        refresh_token_hash:
          type: string
        token_family_id:
          type: string
        parent_session_id:
          type:
            - string
            - 'null'
        user_agent:
          type: string
        client_ip:
          type: string
        device_name:
          type: string
        expires_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        rotated_at:
          type:
            - string
            - 'null'
          format: date-time
        revoked_at:
          type:
            - string
            - 'null'
          format: date-time
        reuse_detected_at:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          type: string
          format: date-time
    UserListResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - total_count
                - page
                - page_size
                - items
              properties:
                total_count:
                  type: integer
                page:
                  type: integer
                page_size:
                  type: integer
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/AdminUser'
    UserSessionListResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              required:
                - user_id
                - count
                - items
              properties:
                user_id:
                  type: string
                count:
                  type: integer
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/AdminUserLoginSession'
    UserSessionRevokeResponse:
      allOf:
        - $ref: '#/components/schemas/APIResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                user_id:
                  type: string
                session_id:
                  type: string
                token_family_id:
                  type: string
                revoked:
                  type: boolean
                revoked_count:
                  type: integer
                operation_type:
                  type: string
