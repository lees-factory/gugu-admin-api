openapi: 3.1.0
info:
  title: Gugu Admin API
  version: 0.1.0
  description: |
    SKU 적재, SKU snapshot 갱신, AliExpress 토큰 관리를 위한 어드민 배치 API 명세입니다.
    2026-04-18 기준으로 상품(product) 레벨 가격 파이프라인은 제거되었고, 가격 정본은 SKU 계층(`sku_price_history`, `sku_price_snapshot`)만 사용합니다.
servers:
  - url: https://lees-admin.duckdns.org
    description: 운영 서버
  - url: http://localhost:8700
    description: 로컬 개발 서버
tags:
  - name: system
    description: 시스템 엔드포인트
  - name: batch
    description: 어드민 배치 엔드포인트
  - name: product
    description: 어드민 상품 조회 엔드포인트
  - name: user
    description: 어드민 사용자/세션 관리 엔드포인트
  - name: admin-auth
    description: 어드민 로그인 및 액세스 토큰 발급
  - name: token
    description: AliExpress OAuth 토큰 관리
paths:
  /health:
    get:
      tags:
        - system
      summary: 헬스 체크
      operationId: healthCheck
      responses:
        '200':
          description: 서버 정상 동작 중
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/admin/auth/login:
    post:
      tags:
        - admin-auth
      security: []
      summary: 관리자 로그인
      description: |
        `admin_user.login_id/password`로 로그인하고 관리자 액세스 토큰(Bearer)을 발급합니다.
        회원가입 API는 제공하지 않으며, 계정은 운영자가 DB에 수동으로 생성합니다.
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
        '400':
          description: 요청 본문 누락/형식 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 인증 실패(id/password 불일치)
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 로그인 처리 실패
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/load-hot-products:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: 인기 상품 적재
      description: |
        AliExpress 인기 상품 메타데이터를 대표 통화(KRW) 기준으로 조회해 `product`/`product_external_alias`에 동기화합니다.
        이 엔드포인트는 가격을 저장하지 않습니다. 가격은 `POST /v1/batch/update-sku-snapshots`에서 SKU 기준으로만 수집됩니다.
        이미 존재하는 상품은 메타/alias만 갱신합니다.
      operationId: loadHotProducts
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotProductLoadRequest'
      responses:
        '202':
          description: 인기 상품 적재 작업 시작됨
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedMessageResponse'
        '400':
          description: 잘못된 요청
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/enrich-skus/hot-products:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: 인기 상품 SKU 보강
      description: SKU가 없는 인기 상품에 대해 Dropshipping API로 SKU를 적재합니다.
      operationId: enrichHotProducts
      responses:
        '202':
          description: SKU 보강 작업 시작됨
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedMessageResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/enrich-skus/all:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: 전체 상품 SKU 보강
      description: 모든 상품에 대해 Dropshipping API로 SKU를 적재합니다.
      operationId: enrichAllProducts
      responses:
        '202':
          description: SKU 보강 작업 시작됨
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptedMessageResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/update-product-prices:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
        - AdminBearer: []
      deprecated: true
      summary: (Deprecated) 상품 가격 갱신 배치
      description: |
        2026-04-18부터 product-level 가격 파이프라인은 제거되었습니다.
        SKU 가격 수집은 `POST /v1/batch/update-sku-snapshots`를 사용하세요.
      operationId: updateProductPrices
      responses:
        '410':
          description: Deprecated endpoint (더 이상 지원하지 않음)
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                error:
                  code: DEPRECATED_ENDPOINT
                  message: update-product-prices is deprecated; use /v1/batch/update-sku-snapshots
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/update-sku-snapshots:
    post:
      tags:
        - batch
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: SKU snapshot 갱신 배치
      description: |
        대상 상품들의 SKU 가격을 AliExpress Dropshipping API에서 다시 조회하여 `sku_price_snapshot`을 갱신합니다.
        SKU 가격이 직전 이력과 다를 때만 `sku_price_history`를 기록합니다.
        `target_group` 의미는 다음과 같습니다: `ALL`(전체), `HOT_PRODUCTS`(`collection_source=HOT_PRODUCT_QUERY`), `TRACKED`(`user_tracked_item.deleted_at IS NULL` 기준 distinct product_id).
        `product_ids`가 주어지면 `target_group`보다 우선합니다.
        저사양 단일 서버 운영 시에는 통화를 직렬로 실행하는 것을 권장합니다.
      operationId: updateSkuSnapshots
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceUpdateRequest'
            examples:
              phase1KRWAll:
                summary: Phase 1 - KRW 전체
                value:
                  currencies:
                    - KRW
                  target_group: ALL
                  requested_by: scheduler
              phase1USDHot:
                summary: Phase 1 - USD 인기상품
                value:
                  currencies:
                    - USD
                  target_group: HOT_PRODUCTS
                  requested_by: scheduler
              phase1USDTracked:
                summary: Phase 1 - USD 추적상품
                value:
                  currencies:
                    - USD
                  target_group: TRACKED
                  requested_by: scheduler
              allProductsDefault:
                summary: 기본값 사용(ALL + KRW)
                value: {}
              trackedOnly:
                summary: 수동 실행 - 추적 상품만
                value:
                  target_group: TRACKED
                  currencies:
                    - USD
                  requested_by: admin
              filteredByIds:
                summary: 특정 상품만
                value:
                  product_ids:
                    - product-id-1
                    - product-id-2
                  currencies:
                    - USD
                  requested_by: admin
      responses:
        '202':
          description: SKU snapshot 갱신 배치 시작됨
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceUpdateAcceptedResponse'
        '400':
          description: 잘못된 요청
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 프리뷰 실패
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/products:
    get:
      tags:
        - product
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: 상품 목록 조회
      description: |
        `product`/`product_localization` 기준 메타 정보를 반환합니다.
        가격 필드(`current_price`, `currency`)는 의도적으로 포함하지 않습니다.
        상세 진입은 `product_url`(AliExpress 링크) 중심 UX를 전제로 합니다.
      operationId: listProducts
      parameters:
        - in: query
          name: language
          required: false
          schema:
            type: string
            enum:
              - KO
              - EN
            default: KO
          description: 조회 언어. KO면 한국어, EN이면 영어 localization을 우선 사용합니다.
        - in: query
          name: collection_source
          required: false
          schema:
            type: string
          description: 수집 경로 필터
      responses:
        '200':
          description: 상품 목록
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 상품 목록 조회 실패
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/batch/status:
    get:
      tags:
        - batch
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: 배치 상태 조회
      description: |
        최근 실행된 배치 작업 상태를 반환합니다.
        현재 조회 가능한 작업 유형은 `SKU_SNAPSHOT_UPDATE` 하나입니다.
      operationId: getBatchStatus
      parameters:
        - in: query
          name: job_type
          required: false
          schema:
            type: string
            enum:
              - SKU_SNAPSHOT_UPDATE
          description: 생략하면 기본값 `SKU_SNAPSHOT_UPDATE`로 조회합니다.
      responses:
        '200':
          description: 배치 상태
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchStatusResponse'
        '400':
          description: 잘못된 작업 유형
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/aliexpress/token/generate:
    post:
      tags:
        - token
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: OAuth 코드로 토큰 발급
      description: |
        AliExpress 셀러 인증 콜백에서 받은 OAuth 코드를 access/refresh 토큰으로 교환합니다.
        발급된 토큰은 DB에 저장됩니다.
      operationId: generateToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenGenerateRequest'
            examples:
              affiliate:
                summary: Affiliate 토큰 발급
                value:
                  code: '3_500102_JxZ05Ux3cnnSSUm6dCxYg6Q26'
                  app_type: AFFILIATE
              dropshipping:
                summary: Dropshipping 토큰 발급
                value:
                  code: '3_500102_abc123'
                  app_type: DROPSHIPPING
      responses:
        '200':
          description: 토큰 발급 및 저장 완료
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResultResponse'
        '400':
          description: 잘못된 요청 또는 미지원 app_type
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 토큰 발급 또는 저장 실패
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/aliexpress/oauth/authorize-url:
    get:
      tags:
        - token
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: OAuth 인가 URL 생성
      description: |
        지정한 app_type에 대해 AliExpress seller authorization URL을 생성합니다.
        반환된 URL로 이동하면 callback 엔드포인트에서 code를 내부적으로 받아 바로 토큰을 저장합니다.
      operationId: getAliExpressAuthorizeUrl
      parameters:
        - in: query
          name: app_type
          required: true
          schema:
            type: string
            enum:
              - AFFILIATE
              - DROPSHIPPING
      responses:
        '200':
          description: 인가 URL 생성 성공
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '400':
          description: 잘못된 앱 유형
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/aliexpress/oauth/callback/affiliate:
    get:
      tags:
        - token
      summary: Affiliate OAuth callback
      description: AliExpress Affiliate 앱 authorization code를 받아 내부 토큰 저장까지 수행합니다.
      operationId: aliexpressAffiliateCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 토큰 저장 성공
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
