  /v1/aliexpress/token/refresh:
    post:
      tags:
        - token
      security:
        - AdminApiKey: []
        - AdminBearer: []
      summary: 토큰 수동 갱신
      description: |
        저장된 refresh_token을 사용하여 access_token을 갱신합니다.
        `app_type`을 지정하면 해당 앱만 갱신하고, 생략하면 AFFILIATE/DROPSHIPPING 둘 다 점검합니다.
        보통 스케줄러가 자동으로 처리하지만 수동 트리거도 가능합니다.
      operationId: refreshToken
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
            examples:
              affiliate:
                summary: Affiliate 토큰 갱신
                value:
                  app_type: AFFILIATE
              allTypes:
                summary: 모든 앱 토큰 점검
                value: {}
      responses:
        '200':
          description: 토큰 갱신 및 저장 완료
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResultResponse'
        '400':
          description: 잘못된 요청 또는 미지원 app_type
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 해당 app_type의 토큰이 없음
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
              $ref: '#/components/headers/Pragma'
            Expires:
              $ref: '#/components/headers/Expires'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 관리자 인증 정보 누락 또는 오류
          headers:
            Cache-Control:
              $ref: '#/components/headers/Cache-Control'
            Pragma:
